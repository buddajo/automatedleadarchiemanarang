<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopify Brand Auditor | Lead Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10">
            <h1 class="text-3xl font-bold text-blue-400">Shopify Brand Auditor</h1>
            <p class="text-slate-400 text-sm">Automated Lead Intelligence for E-commerce Developers</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="card p-6 rounded-xl">
                <h2 class="text-lg font-semibold mb-4 text-blue-300">1. Scanner</h2>
                <label class="block text-xs text-slate-500 mb-1">Amazon Product URL</label>
                <input type="text" id="amazonUrl" placeholder="Paste Amazon link..." class="w-full bg-slate-900 border border-slate-700 rounded p-2 mb-4 text-sm focus:outline-none focus:border-blue-500">
                
                <label class="block text-xs text-slate-500 mb-1">Brand Category (Manual Override)</label>
                <input type="text" id="category" placeholder="e.g. Skincare" class="w-full bg-slate-900 border border-slate-700 rounded p-2 mb-6 text-sm">
                
                <button onclick="runAudit()" id="runBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition">
                    RUN BRAND AUDIT
                </button>
                <p id="status" class="mt-4 text-xs italic text-slate-500 text-center"></p>
            </div>

            <div class="card p-6 rounded-xl">
                <h2 class="text-lg font-semibold mb-4 text-blue-300">2. Brand Data</h2>
                <div class="space-y-4 text-sm">
                    <div class="flex justify-between border-b border-slate-700 pb-2">
                        <span class="text-slate-400">Brand Name:</span>
                        <span id="res-brand" class="font-medium text-right">--</span>
                    </div>
                    <div class="flex justify-between border-b border-slate-700 pb-2">
                        <span class="text-slate-400">Shopify Status:</span>
                        <span id="res-status" class="font-medium text-right">--</span>
                    </div>
                    <div class="flex justify-between border-b border-slate-700 pb-2">
                        <span class="text-slate-400">Founder:</span>
                        <span id="res-founder" class="font-medium text-right">--</span>
                    </div>
                    <div class="flex justify-between border-b border-slate-700 pb-2">
                        <span class="text-slate-400">Job Title:</span>
                        <span id="res-title" class="font-medium text-right">--</span>
                    </div>
                    <div>
                        <span class="block text-slate-400 mb-1">LinkedIn Profile:</span>
                        <a id="res-linkedin" href="#" target="_blank" class="text-blue-400 break-all text-xs hover:underline">--</a>
                    </div>
                    <div>
                        <span class="block text-slate-400 mb-1">Verified Email:</span>
                        <span id="res-email" class="text-green-300 font-mono text-xs">--</span>
                    </div>
                </div>
            </div>

            <div class="card p-6 rounded-xl">
                <h2 class="text-lg font-semibold mb-4 text-blue-300">3. Action</h2>
                
                <label class="block text-xs text-slate-500 mb-1">Subject Line Suggestions</label>
                <div id="res-subjects" class="w-full bg-slate-900 border border-slate-700 rounded p-3 text-xs text-blue-300 mb-4 min-h-[50px]">
                    --
                </div>

                <label class="block text-xs text-slate-500 mb-1">Personalized Email Body</label>
                <textarea id="res-hook" rows="10" class="w-full bg-slate-900 border border-slate-700 rounded p-3 text-sm text-slate-300 focus:outline-none mb-4" readonly></textarea>
                
                <button onclick="copyHook()" class="w-full border border-slate-600 hover:bg-slate-700 text-slate-300 text-sm py-2 rounded mb-2">Copy Email Body</button>
            </div>
        </div>
    </div>

    <script>
        async function runAudit() {
            const btn = document.getElementById('runBtn');
            const status = document.getElementById('status');
            const url = document.getElementById('amazonUrl').value;
            const cat = document.getElementById('category').value;

            if (!url) return alert("Please paste an Amazon URL.");

            btn.disabled = true;
            btn.innerText = "SCANNING...";
            status.innerText = "Connecting to Make.com workflow...";

            try {
                const response = await fetch('https://hook.us2.make.com/jgzqsqilr2bvm6vgyluhitr49xi6i5mg', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amazon_url: url, manual_category: cat })
                });

                // Get raw text first to handle any bad line breaks from the AI
                const rawText = await response.text();
                
                // Remove actual carriage returns/tabs that break JSON.parse
                const cleanText = rawText.replace(/[\n\r\t]/g, " ");
                const data = JSON.parse(cleanText);

                // Mapping the data to UI
                document.getElementById('res-brand').innerText = data.brand || "N/A";
                
                const statusEl = document.getElementById('res-status');
                statusEl.innerText = data.shopify_status || "N/A";
                statusEl.className = data.shopify_status?.includes("Verified") ? "font-medium text-green-400 text-right" : "font-medium text-yellow-400 text-right";
                
                document.getElementById('res-founder').innerText = data.founder || "N/A";
                document.getElementById('res-title').innerText = data.job_title || "N/A";
                document.getElementById('res-linkedin').innerText = data.linkedin && data.linkedin !== "#" ? "View Profile" : "--";
                document.getElementById('res-linkedin').href = data.linkedin || "#";
                document.getElementById('res-email').innerText = data.email || "Seeking...";
                
                // Separated Fields
                document.getElementById('res-subjects').innerText = data.subjects || "No subjects generated.";
                document.getElementById('res-hook').value = data.email_body || "No email body generated.";

                status.innerText = "Audit successful.";
            } catch (err) {
                console.error("Technical Error:", err);
                status.innerText = "Error in workflow or JSON formatting.";
                alert("The workflow finished but the data format was invalid. Check Make.com output.");
            } finally {
                btn.disabled = false;
                btn.innerText = "RUN BRAND AUDIT";
            }
        }

        function copyHook() {
            const hookText = document.getElementById('res-hook');
            if(!hookText.value) return;
            hookText.select();
            document.execCommand('copy');
            alert("Email body copied to clipboard!");
        }
    </script>
</body>
</html>
