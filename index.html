<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadGen Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fallback background if Tailwind fails to load immediately */
        body { background-color: #0f172a; color: white; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-white">LeadGen <span class="text-blue-500">Engine</span></h1>
                <p class="text-slate-400">Shopify Migration Auditor</p>
            </div>
            <button onclick="localStorage.removeItem('currentAudit'); location.reload();" class="px-4 py-2 bg-slate-800 rounded-lg hover:bg-slate-700 transition">Clear Data</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 bg-slate-900/50 border border-slate-800 p-6 rounded-2xl">
                <label class="block text-sm font-medium mb-2">Amazon Product URL</label>
                <input id="amazonUrl" type="text" placeholder="Paste link here..." class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 mb-4 text-white">
                <button onclick="runAudit()" id="auditBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition">Run Audit</button>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div id="statusUpdate" class="p-4 bg-blue-900/20 border border-blue-800 rounded-xl text-blue-300 text-sm">
                    Enter a URL on the left to begin the brand audit.
                </div>
                
                <div id="resultsArea" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const WEBHOOK_AUDIT = 'https://hook.us2.make.com/jgzqsqilr2bvm6vgyluhitr49xi6i5mg';

        async function runAudit() {
            const btn = document.getElementById('auditBtn');
            const url = document.getElementById('amazonUrl').value;
            if(!url) return alert("Paste a link first!");

            btn.innerText = "Analyzing...";
            document.getElementById('statusUpdate').innerText = "Sending to Make.com engine...";
            
            try {
                const response = await fetch(WEBHOOK_AUDIT, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ amazonUrl: url })
                });
                
                const data = await response.json();
                localStorage.setItem('currentAudit', JSON.stringify(data));
                updateUI(data);
            } catch (err) {
                document.getElementById('statusUpdate').innerText = "Error: Make.com scenario is not active or Webhook URL is wrong.";
                btn.innerText = "Run Audit";
            }
        }
    </script>
</body>
</html>
